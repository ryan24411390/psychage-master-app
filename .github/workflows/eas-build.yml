# Requires repo secret EXPO_TOKEN (Expo access token) — set by human before first run.
# See docs/EAS-PIPELINE-RUNBOOK.md step 4.
#
# Manual-trigger only. Cloud builds cost minutes; auto-build on push/PR is deliberately
# omitted until credentials + project are configured.

name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - ios
          - android
          - all

concurrency:
  group: eas-build-${{ github.ref }}-${{ inputs.profile }}-${{ inputs.platform }}
  cancel-in-progress: false

jobs:
  build:
    name: eas build (${{ inputs.profile }} / ${{ inputs.platform }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build
        working-directory: apps/mobile
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --no-wait
